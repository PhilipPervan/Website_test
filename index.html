<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My First Website</title>
<style>
  body {
    font-family: sans-serif;
    background: #1e1e2f;
    color: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    text-align: center;
  }
  h1 { font-size: 2.5rem; }
  button {
    margin-top: 1rem;
    padding: 0.7rem 1.4rem;
    font-size: 1rem;
    border: none;
    border-radius: 8px;
    background: #4f9dff;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #3a86e0; }
  #counter { font-size: 1.5rem; margin-top: 1rem; }
</style>
</head>
<body>

  <h1>Hello, this is my website!</h1>
  <p>This is a tiny test page — just to see it working live.</p>

  <div id="counter">Clicks: 0</div>
  <button onclick="increment()">Click me</button>

  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('counter').textContent = 'Clicks: ' + count;
    }
  </script>

</body>
</html>
